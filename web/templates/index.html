<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Chanakya | Command Center</title>
    <!-- Tailwind CSS for Military UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .neon-border { border: 1px solid #1e293b; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
        /* Custom scrollbar for logs */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 font-mono h-screen flex flex-col">
    
    <!-- 🟢 HEADER SECTION -->
    <header class="flex flex-wrap justify-between items-center mb-6 pb-4 border-b border-gray-700 gap-4">
        <div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-red-500 tracking-widest drop-shadow-md">PROJECT CHANAKYA</h1>
            <h2 class="text-lg md:text-xl text-blue-400 tracking-[0.3em]">COMMAND CENTER</h2>
        </div>
        <div class="flex space-x-3 text-xs md:text-sm">
            <div class="bg-blue-900/30 border border-blue-500 px-4 py-2 rounded text-blue-300 font-bold tracking-widest shadow-[0_0_10px_rgba(59,130,246,0.2)]">
                CPU: ACTIVE
            </div>
            <div class="bg-green-900/30 border border-green-500 px-4 py-2 rounded text-green-400 font-bold flex items-center tracking-widest shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                <span class="h-2 w-2 bg-green-500 rounded-full mr-2 animate-pulse"></span> SYSTEM ONLINE
            </div>
        </div>
    </header>

    <!-- 🟢 MAIN DASHBOARD GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1 min-h-0">
        
        <!-- Left Column: Video Feed (Spans 2 columns on large screens) -->
        <div class="col-span-1 lg:col-span-2 flex flex-col neon-border bg-gray-800 rounded-lg overflow-hidden">
            <div class="bg-gray-900 px-4 py-3 flex justify-between items-center border-b border-gray-700">
                <h3 class="text-sm font-bold text-gray-300 tracking-wider">
                    <span class="text-red-500 inline-block mr-2 animate-pulse">●</span> REAL-TIME SURVEILLANCE
                </h3>
                <span class="text-xs text-gray-500 border border-gray-600 px-2 py-1 rounded">ZONE: ALPHA</span>
            </div>
            
            <!-- Video Container -->
            <div class="flex-1 bg-black relative flex items-center justify-center min-h-[400px]">
                <img src="{{ url_for('video_feed') }}" alt="Live Feed" class="w-full h-full object-contain">
            </div>
        </div>

        <!-- Right Column: Database Logs & Metrics -->
        <div class="col-span-1 flex flex-col gap-6 min-h-0">
            
            <!-- Latest Detections Panel -->
            <div class="flex-1 flex flex-col neon-border bg-gray-800 rounded-lg overflow-hidden">
                <div class="bg-gray-900 px-4 py-3 border-b border-gray-700">
                    <h3 class="text-sm font-bold text-blue-400 tracking-wider">LATEST DETECTIONS</h3>
                </div>
                
                <!-- 🎯 THIS IS WHERE JAVASCRIPT INJECTS DATA -->
                <div id="detection-logs" class="flex-1 p-3 overflow-y-auto space-y-2 bg-gray-900/50">
                    <div class="flex items-center justify-center h-full text-gray-500 text-sm animate-pulse">
                        Awaiting database sync...
                    </div>
                </div>
            </div>

            <!-- Mini Status Panel -->
            <div class="h-32 neon-border bg-gray-800 rounded-lg overflow-hidden flex flex-col">
                <div class="bg-gray-900 px-4 py-2 border-b border-gray-700">
                    <h3 class="text-xs font-bold text-gray-400 tracking-wider">DB CONNECTION</h3>
                </div>
                <div class="flex-1 p-4 flex flex-col justify-center">
                    <p class="text-green-500 text-sm font-bold">✓ SQLite Active</p>
                    <p class="text-gray-400 text-xs mt-1">Fetching new logs every 2.5s</p>
                </div>
            </div>

        </div>
    </div>

    <!-- 🧠 DYNAMIC JAVASCRIPT (Fetches from /api/logs) -->
    <script>
        function updateDashboard() {
            fetch('/api/logs')
                .then(response => response.json())
                .then(data => {
                    const logContainer = document.getElementById('detection-logs');
                    
                    if (data.length > 0) {
                        logContainer.innerHTML = ''; // Clear the "awaiting sync" message
                        
                        data.forEach(log => {
                            // Logic for colors based on Threat Score
                            let isHighThreat = log.threat > 50;
                            let bgClass = isHighThreat ? 'bg-red-900/20 border-red-500/50' : 'bg-gray-800 border-gray-600';
                            let textClass = isHighThreat ? 'text-red-400' : 'text-green-400';
                            let icon = isHighThreat ? '⚠️' : '✅';
                            
                            // Build the HTML for a single log entry
                            let logHTML = `
                                <div class="border flex flex-col p-3 rounded-md shadow-sm ${bgClass}">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-[10px] text-gray-400">${log.timestamp}</span>
                                        <span class="font-bold text-xs ${textClass}">Threat: ${log.threat}%</span>
                                    </div>
                                    <div class="text-white font-bold tracking-wider text-sm">
                                        ${icon} ${log.object}
                                    </div>
                                </div>
                            `;
                            logContainer.innerHTML += logHTML;
                        });
                    }
                })
                .catch(error => console.error('DB Sync Error:', error));
        }

        // Keep checking the database every 2.5 seconds
        setInterval(updateDashboard, 2500);
        
        // Initial fetch when page loads
        updateDashboard();
    </script>
</body>
</html>
