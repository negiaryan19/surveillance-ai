<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Chanakya | Multi-Grid Command Center</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --neon-cyan: #00ffcc;
            --neon-red: #ff3333;
            --text-gray: #8b949e;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; color: var(--neon-cyan); letter-spacing: 2px; font-size: 24px; text-transform: uppercase; }
        
        .status-badge {
            background: rgba(0, 255, 204, 0.1); color: var(--neon-cyan);
            padding: 5px 15px; border: 1px solid var(--neon-cyan);
            border-radius: 4px; font-size: 14px; font-weight: bold;
        }

        /* GRID LAYOUT FOR MULTI-CAM */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Cameras side-by-side */
            gap: 15px;
        }

        .video-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            position: relative;
        }

        .video-card h2 {
            font-size: 14px; color: var(--text-gray);
            margin: 0 0 10px 0; display: flex; align-items: center;
        }

        .video-card h2::before {
            content: ""; width: 8px; height: 8px;
            background: var(--neon-red); border-radius: 50%;
            display: inline-block; margin-right: 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .feed-img { width: 100%; border-radius: 4px; border: 1px solid #444; }

        /* LOGS PANEL */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }
        .logs-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 15px; height: 400px;
            display: flex; flex-direction: column;
        }

        .logs-container { flex-grow: 1; overflow-y: auto; font-size: 13px; }
        .log-entry { padding: 8px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .threat-critical { color: var(--neon-red); font-weight: bold; }
        .threat-warning { color: #d2a8ff; }
        .threat-safe { color: var(--neon-cyan); }

        /* SECURE DOWNLOAD BUTTON */
        .btn-report {
            display: block; width: 100%; padding: 12px; margin-top: 10px;
            background: transparent; color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); border-radius: 4px;
            text-align: center; text-decoration: none; font-weight: bold;
            transition: 0.3s;
        }

        .btn-report:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px rgba(0,255,204,0.5); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PROJECT CHANAKYA <span style="font-weight: 300; font-size: 16px; color: var(--text-gray);">| MULTI-GRID</span></h1>
        <div class="status-badge">DEFENCE NETWORK ACTIVE</div>
    </div>

    <div class="dashboard-grid">
        <div class="camera-grid">
            <div class="video-card">
                <h2>FEED: ALPHA (MASTER)</h2>
                <img src="{{ url_for('video_feed_1') }}" class="feed-img" alt="Cam 1">
            </div>
            
            <div class="video-card">
                <h2>FEED: BRAVO (PERIMETER)</h2>
                <img src="{{ url_for('video_feed_2') }}" class="feed-img" alt="Cam 2">
            </div>
        </div>

        <div class="side-panel">
            <div class="logs-card">
                <h2 style="font-size: 14px; color: var(--text-gray); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">TACTICAL LOGS</h2>
                <div class="logs-container" id="logs">
                    <div class="log-entry">Initializing secure connection...</div>
                </div>
            </div>

            <div class="logs-card" style="height: auto;">
                <h2 style="font-size: 14px; color: var(--text-gray); margin-top: 0;">INTELLIGENCE VAULT</h2>
                <p style="font-size: 12px; color: #8b949e;">Generate end-to-end encrypted forensic report.</p>
                <a href="/download_secure_report" class="btn-report">
                    🔐 DOWNLOAD SECURE BRIEFING
                </a>
            </div>
        </div>
    </div>

    <script>
        function fetchLogs() {
            fetch('/api/logs')
                .then(response => response.json())
                .then(data => {
                    const logsDiv = document.getElementById('logs');
                    logsDiv.innerHTML = '';
                    data.forEach(log => {
                        let threatClass = 'threat-safe';
                        if (log.threat >= 80) threatClass = 'threat-critical';
                        else if (log.threat >= 50) threatClass = 'threat-warning';

                        logsDiv.innerHTML += `
                            <div class="log-entry">
                                <span>[${log.timestamp.split(' ')[1]}] ${log.object}</span>
                                <span class="${threatClass}">T-${log.threat}%</span>
                            </div>
                        `;
                    });
                });
        }
        setInterval(fetchLogs, 2500);
        fetchLogs();
    </script>
</body>
</html>
